model:
  model_id: "Qwen/Qwen2.5-Omni-7B"
  torch_dtype: "bfloat16"
  device_map: "auto"

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: "none"
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  num_epochs: 3
  batch_size: 2
  learning_rate: 1e-4
  warmup_steps: 100
  save_steps: 200
  logging_steps: 10
  gradient_accumulation_steps: 8
  max_length: 1024
  val_split: 0.05
  seed: 42

paths:
  audio_root: "data/audio/"
  data_path: "data/train.json"
  output_dir: "checkpoints/"
